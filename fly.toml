# Fly.io config for the API
# Deploy with: fly deploy --config fly.toml

app = "interview-platform-api"
primary_region = "ord"  # Chicago — change to your nearest region

[build]
  dockerfile = "apps/api/Dockerfile"
  build-target = "runner"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Secret env vars — set via: fly secrets set KEY=value
# Required:
#   DATABASE_URL
#   REDIS_URL
#   BETTER_AUTH_SECRET
#   BETTER_AUTH_URL
#   FRONTEND_URL
#   ANTHROPIC_API_KEY
# Optional:
#   RESEND_API_KEY
#   SENTRY_DSN
